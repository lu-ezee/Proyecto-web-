<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lox | Dentro de mi mente</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto:wght@300&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            color: white;
            background: radial-gradient(circle at center, #050505 0%, #000 100%);
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Oscuridad general */
        .oscuro {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2;
        }

        .sol {
            position: fixed;
            top: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #ffcc00);
            opacity: 0;
            z-index: 3;
            transition: opacity 2s;
        }

        .nube {
            position: fixed;
            width: 150px;
            height: 60px;
            background: white;
            border-radius: 50px;
            opacity: 0;
            z-index: 3;
            animation: moverNube 25s linear infinite;
        }

        .nube:nth-of-type(1) { top: 120px; }
        .nube:nth-of-type(2) { top: 200px; }

        @keyframes moverNube {
            from { transform: translateX(-200px); }
            to { transform: translateX(120vw); }
        }

        .trueno {
            position: fixed;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            z-index: 4;
        }

        .trueno.activo {
            animation: flash 0.3s;
        }

        @keyframes flash {
            0% {opacity: 0;}
            50% {opacity: 1;}
            100% {opacity: 0;}
        }

        .portada {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 5;
            text-align: center;
            padding: 20px;
        }

        .portada h1 {
            font-family: 'Playfair Display';
            font-size: 40px;
        }

        .portada p {
            max-width: 600px;
            color: #ccc;
        }

        .portada button {
            margin-top: 20px;
            padding: 12px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
            cursor: pointer;
        }

        .overlay {
            display: none;
            padding: 20px;
            position: relative;
            z-index: 6;
        }

        h2 {
            text-align: center;
        }

        .temas {
            text-align: center;
        }

        .temas button {
            margin: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
            cursor: pointer;
        }

        .temas button:hover {
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<div class="oscuro"></div>

<canvas id="lluvia"></canvas>
<div class="trueno" id="trueno"></div>
<div class="sol" id="sol"></div>
<div class="nube"></div>
<div class="nube"></div>

<!-- Sonidos -->
<audio id="lluviaSound" src="https://www.soundjay.com/nature/sounds/rain-01.mp3" loop></audio>
<audio id="truenoSound" src="https://www.soundjay.com/nature/sounds/thunder-01.mp3"></audio>

<!-- PORTADA -->
<div class="portada">
    <h1>Lox</h1>

    <p>
        Nací en La Plata, Buenos Aires. Encontré en la música una forma de decir lo que no podía explicar.
        Entre emociones, noches frías y pensamientos que no se callan, empecé a escribir.
        Esto no es solo música… es mi mente hecha sonido.
    </p>

    <button id="btnEntrar">Entrar a mi mundo</button>
</div>

<!-- CONTENIDO -->
<div class="overlay" id="contenido">

    <h2>🌧️ Canciones tristes</h2>
    <div class="temas" id="tristes"></div>

    <h2>☀️ Canciones alegres</h2>
    <div class="temas" id="alegres"></div>

</div>

<script>

/* ===== CANCIONES ===== */
const canciones = {
    tristes: [
        { nombre: "Mentiras", url: "https://youtu.be/vJhbeY7GvSQ" },
        { nombre: "Estorbo", url: "https://youtu.be/qDxhUfGue_c" }
    ],
    alegres: [
        { nombre: "Mi despertar", url: "https://youtu.be/V9R-5lC0wS4" },
        { nombre: "Karma", url: "https://youtu.be/g5p6JDJOqT8" }
    ]
};

/* ===== GENERAR BOTONES ===== */
function renderTemas() {
    const contTristes = document.getElementById("tristes");
    const contAlegres = document.getElementById("alegres");

    canciones.tristes.forEach(c => {
        const btn = document.createElement("button");
        btn.textContent = c.nombre;
        btn.onclick = () => window.open(c.url);
        contTristes.appendChild(btn);
    });

    canciones.alegres.forEach(c => {
        const btn = document.createElement("button");
        btn.textContent = c.nombre;
        btn.onclick = () => window.open(c.url);
        contAlegres.appendChild(btn);
    });
}

/* ===== LLUVIA ===== */
const canvas = document.getElementById("lluvia");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gotas = [];

for (let i = 0; i < 200; i++) {
    gotas.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        speed: Math.random() * 5
    });
}

let lloviendo = true;

function animar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (lloviendo) {
        ctx.strokeStyle = "rgba(174,194,224,0.5)";

        gotas.forEach(g => {
            ctx.beginPath();
            ctx.moveTo(g.x, g.y);
            ctx.lineTo(g.x, g.y + 10);
            ctx.stroke();

            g.y += g.speed;
            if (g.y > canvas.height) g.y = 0;
        });
    }

    requestAnimationFrame(animar);
}

/* ===== CLIMA ===== */
const lluviaSound = document.getElementById("lluviaSound");
const truenoSound = document.getElementById("truenoSound");

function climaLoop() {
    const sol = document.getElementById("sol");
    const trueno = document.getElementById("trueno");
    const nubes = document.querySelectorAll(".nube");

    setTimeout(() => {
        trueno.classList.add("activo");
        truenoSound.play();
        setTimeout(() => trueno.classList.remove("activo"), 300);
    }, 3000);

    setTimeout(() => {
        lloviendo = false;
        lluviaSound.pause();
        sol.style.opacity = 1;
        nubes.forEach(n => n.style.opacity = 0.8);
    }, 6000);

    setTimeout(() => {
        sol.style.opacity = 0;
        nubes.forEach(n => n.style.opacity = 0);
        lloviendo = true;
        lluviaSound.play();
        climaLoop();
    }, 11000);
}

/* ===== ENTRAR ===== */
document.getElementById("btnEntrar").onclick = () => {
    document.querySelector(".portada").style.display = "none";
    document.getElementById("contenido").style.display = "block";

    lluviaSound.play();
    renderTemas();
    animar();
    climaLoop();
};

</script>

</body>
</html>
